<div class="container mx-auto p-6">
  <!-- Encabezado de la Sección -->
  <header class="mb-8">
    <h1 class="text-3xl font-extrabold text-gray-900">Pokedex Analytics Platform</h1>
    <p class="text-gray-600 mt-2">
      Analiza especímenes con filtrado multidimensional en tiempo real.
    </p>
  </header>

  <!-- Sección de Filtros -->
  <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-8">
    <h2 class="text-lg font-semibold text-gray-800 mb-4">Consola de Filtros</h2>
    <!-- 
      El componente de filtros emite 'filterChange' cada vez que el usuario 
      escribe algo (con debounce de 300ms)
    -->
    <app-pokemon-filters (filterChange)="onFilterChange($event)"></app-pokemon-filters>
  </section>

  <!-- Sección de Tabla de Resultados -->
  <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
    <h2 class="text-lg font-semibold text-gray-800 mb-4">Resultados del Análisis</h2>
    
    <!-- 
      El componente de tabla es un "Dumb Component": 
      Solo se encarga de pintar lo que recibe desde el PokedexState 
    -->
    <app-pokemon-table></app-pokemon-table>
  </section>
</div>
